name: Generate, Preview and Publish RSS

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Deploy generated RSS to GitHub Pages"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0/6 * * *'  # каждые 6 часов

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 feedgen python-dotenv
          playwright install

      - name: Generate RSS feed
        env:
          LJ_USERNAME: ${{ secrets.LJ_USERNAME }}
          LJ_PASSWORD: ${{ secrets.LJ_PASSWORD }}      
          LJ_URL:      ${{ secrets.LJ_URL }}      
          LJ_EXCLUDED_TAGS: ${{ secrets.LJ_EXCLUDED_TAGS }}
        run: |
          mkdir -p docs
          python main_scraper.py
          mv dekodeko_lj_feed.xml docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Upload preview artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rss-preview
          path: docs/dekodeko_lj_feed.xml

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
