name: Deploy RSS to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0/2 * * *'  # запускать ровно каждые 2 часа, в начале часа

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 feedgen
          playwright install

      - name: Run RSS generator
        run: python main_scraper.py

      - name: Commit updated RSS file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dekodeko_lj_feed.xml
          git commit -m "Update RSS feed generated by workflow" || echo "No changes to commit"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
          publish_branch: gh-pages
