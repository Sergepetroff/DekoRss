name: Generate and Publish RSS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0/6 * * *'  # каждые 6 часов

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 feedgen python-dotenv
          playwright install

      - name: Generate RSS feed
        env:
          LJ_USERNAME: ${{ secrets.LJ_USERNAME }}
          LJ_PASSWORD: ${{ secrets.LJ_PASSWORD }}      
          LJ_URL:      ${{ secrets.LJ_URL }}      
          LJ_EXCLUDED_TAGS: ${{ secrets.LJ_EXCLUDED_TAGS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: |
          mkdir -p docs
          python main_scraper.py
          mv dekodeko_lj_feed.xml docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
